laravel: '@testbench'

providers:
  - Lorisleiva\Actions\ActionServiceProvider
  - Inertia\ServiceProvider
  - Laravel\Nova\NovaCoreServiceProvider
  - Laravel\Nova\NovaServiceProvider
  - Laravel\Fortify\FortifyServiceProvider
  - Laravel\Dusk\DuskServiceProvider
  - Workbench\App\Providers\WorkbenchServiceProvider
  - Workbench\App\Providers\NovaServiceProvider
  - Opscale\Actions\ToolServiceProvider

seeders:
  - Workbench\Database\Seeders\DatabaseSeeder

workbench:
  start: /nova
  install: true
  build:
    - package:discover
    - asset-publish
    - create-sqlite-db
    - db:wipe
    - migrate:refresh
    - 'db:seed --class="Workbench\Database\Seeders\DatabaseSeeder"'
  assets:
    - nova-assets
  sync: []

purge:
  directories:
    - lang/*
    - public/vendor/*
